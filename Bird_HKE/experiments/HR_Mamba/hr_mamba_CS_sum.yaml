CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true
GPUS: [0] #(0,1) ## Change based on number of GPUs
WORKERS: 3
PRINT_FREQ: 1

DATASET:
  COLOR_RGB: false
  DATASET: 'BirdGazeDataset'
  FLIP: true
  NUM_JOINTS_HALF_BODY: 4
  PROB_HALF_BODY: -1.0
  ROOT: birdgaze_corrected_subset
  ROT_FACTOR: 30
  SCALE_FACTOR: 0.25
  TEST_SET: test
  TRAIN_SET: train
MODEL:
  INIT_WEIGHTS: true
  NAME: pose_hr_mamba_sum
  NUM_JOINTS: 4
  PRETRAINED: r''
  IMAGE_SIZE:
  - 256
  - 256
  HEATMAP_SIZE:
  - 64
  - 64
  SIGMA: 2
  EXTRA:
    PRETRAINED_LAYERS:
    - 'conv1'
    - 'bn1'
    - 'conv2'
    - 'bn2'
    - 'layer1'
    - 'transition1'
    - 'stage2'
    - 'transition2'
    - 'stage3'
    - 'transition3'
    - 'stage4'
    FINAL_CONV_KERNEL: 1
    STAGE2:
      NUM_MODULES: 1
      NUM_BRANCHES: 2
      BLOCK: BASIC
      NUM_BLOCKS:
      - 4
      - 4
      NUM_CHANNELS:
      - 32
      - 64
      FUSE_METHOD: SUM
    STAGE3:
      NUM_MODULES: 4
      NUM_BRANCHES: 3
      BLOCK: BASIC
      NUM_BLOCKS:
      - 4
      - 4
      - 4
      NUM_CHANNELS:
      - 32
      - 64
      - 128
      FUSE_METHOD: SUM
    STAGE4:
      NUM_MODULES: 3
      NUM_BRANCHES: 4
      BLOCK: BASIC
      NUM_BLOCKS:
      - 4
      - 4
      - 4
      - 4
      NUM_CHANNELS:
      - 32
      - 64
      - 128
      - 256
      FUSE_METHOD: SUM
    # MambaVision adapter settings
    MAMBA:
      # If PURE: true, use the research-grade pure-Mamba SSM backbone
      PURE: true
      # Pure-Mamba params (used only when PURE: true)
      PATCH_SIZE: 4       # patch size used by pure-Mamba patch embedding
      EMBED_DIM: 768      # embedding dimension produced by pure-Mamba backbone
      DEPTH: 1            # number of multi-directional Mamba layers
      FUSE: 'sum'      # fuse strategy: 'linear' or 'sum' or 'concat_gate'
      DEPROJ_OUT_CHANNELS: 64  # final channel count after de-projection (to match conv1 output)
      # Backward-compatible settings for MambaVision adapter (ignored when PURE: true)
      VARIANT: ''
      PRETRAINED: false
    FUSE_STREGY: 'add'
LOSS:
  USE_TARGET_WEIGHT: true
TRAIN:
  RESUME_FROM_CKPT: true
  CKPT_DIR: 'Bird_HKE/trained_models/BirdGaze_Corrected_Subset/HR_MAMBA_sum' # Where to save/load model checkpoints and where to save final model
  LOG_DIR: 'Bird_HKE/trained_models/BirdGaze_Corrected_Subset/HR_MAMBA_sum' # Where to save training logs
  BATCH_SIZE_PER_GPU: 8
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 100
  OPTIMIZER: adamw
  LR: 0.0005
  LR_SCHEDULE: cosine
  WARMUP_EPOCHS: 5
  MIN_LR: 1e-5
  CLIP_GRAD_NORM: 1.0
  GRAD_ACCUM_STEPS: 8   # effective batch ~= 8 (micro) x 8 = 64
  WD: 0.01
FINETUNE:
  RESUME_FROM_CKPT: true
  DATA_DIR: occlusion_FINETUNE_ebird
  SOURCE_DIR: 'Bird_HKE/trained_models/BirdGaze_Corrected_Subset/HR_MAMBA_sum' # Directory containing outputs from train.py; finetune loads final_model.pth or falls back to checkpoint.pth
  CKPT_DIR: 'Bird_HKE/trained_models/BirdGaze_Corrected_Subset/HR_MAMBA_sum' # Finetune outputs stay here, but use finetune_* filenames so base training files are preserved
  LOG_DIR: 'Bird_HKE/trained_models/BirdGaze_Corrected_Subset/HR_MAMBA_sum' # Finetune logs stay here, but use finetune_* filenames so base training logs are preserved
  BATCH_SIZE_PER_GPU: 8
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 100
  OPTIMIZER: adamw
  LR: 0.0005
  LR_SCHEDULE: cosine
  WARMUP_EPOCHS: 5
  MIN_LR: 1e-5
  CLIP_GRAD_NORM: 1.0
  GRAD_ACCUM_STEPS: 8   # effective batch ~= 8 (micro) x 8 = 64
  WD: 0.01
TEST:
  BATCH_SIZE_PER_GPU: 1
  DETECT_MODEL_FILE: 'Bird_HKE/trained_models/YOLOv8Bird.pt'
  POSE_MODEL_FILE: 'Bird_HKE/trained_models/BirdGaze_Corrected_Subset/HR_MAMBA_sum/model_best.pth'
  OUTPUT_DIR: 'Bird_HKE/videos_experiments/BirdGaze_Corrected_Subset/HR_MAMBA_sum'  # Where to save testing results
  FLIP_TEST: true
  POST_PROCESS: true
  SHIFT_HEATMAP: true
DEBUG:
  DEBUG: false
  SAVE_BATCH_IMAGES_GT: false
  SAVE_BATCH_IMAGES_PRED: false
  SAVE_HEATMAPS_GT: false
  SAVE_HEATMAPS_PRED: false

